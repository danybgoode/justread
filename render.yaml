services:
  - type: web
    name: miniflux-rss-app
    env: image
    image:
      url: miniflux/miniflux:latest
    plan: free
    region: oregon
    envVars:
      - key: RUN_MIGRATIONS
        value: "1"
      - key: CREATE_ADMIN
        value: "1"
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
